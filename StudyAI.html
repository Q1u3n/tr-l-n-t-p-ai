<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyAI — Trợ lý ôn thi thông minh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; width: 100%; overflow: hidden; }
    body { font-family: 'Be Vietnam Pro', sans-serif; background: #080810; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .sidebar-mobile-open { transform: translateX(0) !important; }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed !important;
        left: 0; top: 0;
        transform: translateX(-100%);
        transition: transform 0.3s ease;
        z-index: 100 !important;
      }
      .menu-btn { display: flex !important; }
      .quick-grid { grid-template-columns: 1fr !important; }
      .topbar-right span { display: none; }
    }

    .subject-btn:hover { background: rgba(78,205,196,0.08) !important; color: #4ECDC4 !important; }
    .mode-btn:hover { background: rgba(255,255,255,0.04) !important; color: #ccc !important; }
    .quick-btn:hover { background: rgba(255,255,255,0.07) !important; border-color: rgba(255,255,255,0.18) !important; color: #ddd !important; }
    .clear-btn:hover { background: rgba(255,80,80,0.08) !important; color: #ff6b6b !important; border-color: #ff6b6b !important; }
    .send-btn:hover:not(:disabled) { transform: scale(1.06); filter: brightness(1.15); }
    .send-btn:disabled { opacity: 0.35 !important; cursor: not-allowed; }
    .mode-chip:hover { filter: brightness(1.2); }

    /* API Manager Panel */
    .api-manager {
      position: fixed; inset: 0; z-index: 200;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
      animation: fadeIn 0.2s ease;
    }
    .api-panel {
      background: #0e0e1a;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 28px;
      width: min(520px, 95vw);
      max-height: 88vh;
      overflow-y: auto;
      animation: slideDown 0.25s ease;
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    }
    .key-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      margin-bottom: 8px;
      transition: border-color 0.2s;
    }
    .key-row:hover { border-color: rgba(255,255,255,0.14); }
    .key-row.active-key { border-color: rgba(78,205,196,0.35); background: rgba(78,205,196,0.05); }
    .key-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #d0d0e8; font-size: 12.5px; font-family: 'Be Vietnam Pro', monospace;
    }
    .key-input::placeholder { color: #3a3a4a; }
    .tag-badge {
      padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700;
      background: rgba(78,205,196,0.15); color: #4ECDC4; white-space: nowrap;
    }
    .del-btn {
      background: none; border: none; color: #444; cursor: pointer;
      font-size: 16px; padding: 2px 4px; border-radius: 4px; transition: color 0.2s;
    }
    .del-btn:hover { color: #ff6b6b; }
    .add-key-btn {
      width: 100%; padding: 9px; border-radius: 10px;
      border: 1px dashed rgba(255,255,255,0.1); background: transparent;
      color: #555; font-size: 12px; cursor: pointer;
      font-family: 'Be Vietnam Pro', sans-serif;
      transition: all 0.2s;
    }
    .add-key-btn:hover { border-color: rgba(78,205,196,0.3); color: #4ECDC4; }
    .save-btn-main {
      width: 100%; padding: 11px; border-radius: 12px;
      border: none; background: linear-gradient(135deg, #4ECDC4, #3db8b0);
      color: #0a0a0f; font-size: 14px; font-weight: 700;
      cursor: pointer; font-family: 'Sora', sans-serif;
      transition: all 0.2s; margin-top: 16px;
    }
    .save-btn-main:hover { filter: brightness(1.1); transform: scale(1.02); }

    /* Status bar */
    .status-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px;
      background: rgba(8,8,16,0.9);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 11px;
    }
    .key-status-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .setup-hint {
      cursor: pointer; text-decoration: underline; text-decoration-style: dotted;
      text-underline-offset: 3px;
    }
    .setup-hint:hover { color: #4ECDC4 !important; }

    /* Usage counter */
    .usage-chip {
      padding: 2px 8px; border-radius: 20px; font-size: 10px;
      background: rgba(255,255,255,0.05); color: #555;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect, useCallback } = React;

    /* ─────────────── Constants ─────────────── */
    const MODES = [
      { id: "explain",   icon: "🧠", label: "Giải thích",  color: "#4ECDC4", desc: "Giải thích khái niệm dễ hiểu" },
      { id: "quiz",      icon: "📝", label: "Trắc nghiệm", color: "#FFE66D", desc: "Tạo câu hỏi ôn tập" },
      { id: "summarize", icon: "📚", label: "Tóm tắt",     color: "#A8E6CF", desc: "Tóm tắt bài học" },
      { id: "flashcard", icon: "🃏", label: "Flashcard",   color: "#FF8B94", desc: "Tạo thẻ ghi nhớ" },
      { id: "solve",     icon: "🔢", label: "Giải bài",    color: "#B8B8FF", desc: "Giải bài tập từng bước" },
      { id: "chat",      icon: "💬", label: "Hỏi đáp",     color: "#FFDAB9", desc: "Hỏi tự do với AI" },
    ];

    const SUBJECTS = ["Toán","Vật Lý","Hóa Học","Sinh Học","Văn","Lịch Sử","Địa Lý","Tiếng Anh","Tin Học"];

    const STORAGE_KEY = "studyai_key_pool_v2";

    /* ─────────────── Helpers ─────────────── */
    function loadPool() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        return JSON.parse(raw); // [{key, label, uses}]
      } catch { return []; }
    }

    function savePool(pool) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(pool));
    }

    function getPrompt(mode, subject, input) {
      const s = subject ? `môn ${subject}` : "";
      switch (mode) {
        case "explain":   return `Bạn là gia sư ${s}. Hãy giải thích khái niệm sau một cách dễ hiểu, có ví dụ minh họa thực tế, trình bày rõ ràng:\n\n${input}`;
        case "quiz":      return `Tạo 5 câu hỏi trắc nghiệm ${s} về chủ đề: "${input}". Mỗi câu có 4 lựa chọn A/B/C/D và đáp án đúng kèm giải thích ngắn.`;
        case "summarize": return `Tóm tắt bài học ${s} sau thành các ý chính, dễ nhớ, dùng bullet points:\n\n${input}`;
        case "flashcard": return `Tạo 6 flashcard ghi nhớ ${s} về chủ đề: "${input}". Mỗi flashcard: THUẬT NGỮ | ĐỊNH NGHĨA ngắn gọn.`;
        case "solve":     return `Giải bài tập ${s} sau đây từng bước chi tiết:\n\n${input}`;
        case "chat":      return `Bạn là gia sư thông minh ${s}. Trả lời bằng tiếng Việt, ngắn gọn và dễ hiểu:\n\n${input}`;
        default:          return input;
      }
    }

    function maskKey(key) {
      if (!key || key.length < 12) return key;
      return key.slice(0, 10) + "•".repeat(Math.min(key.length - 14, 14)) + key.slice(-4);
    }

    /* ─────────────── API Key Manager Modal ─────────────── */
    function ApiManagerModal({ onClose, onSave, initialPool }) {
      const [rows, setRows] = useState(() =>
        initialPool.length > 0
          ? initialPool.map(r => ({ ...r, _id: Math.random() }))
          : [{ _id: Math.random(), key: "", label: "Key 1", uses: 0 }]
      );
      const [mode, setMode] = useState("pool"); // pool | single

      function addRow() {
        setRows(r => [...r, { _id: Math.random(), key: "", label: `Key ${r.length + 1}`, uses: 0 }]);
      }

      function updateRow(id, field, val) {
        setRows(r => r.map(row => row._id === id ? { ...row, [field]: val } : row));
      }

      function removeRow(id) {
        setRows(r => r.filter(row => row._id !== id));
      }

      function handleSave() {
        const valid = rows.filter(r => r.key.trim().startsWith("sk-"));
        if (valid.length === 0) {
          alert("Vui lòng nhập ít nhất 1 API Key hợp lệ (bắt đầu bằng sk-)");
          return;
        }
        onSave(valid.map(r => ({ key: r.key.trim(), label: r.label || "Key", uses: r.uses || 0 })));
        onClose();
      }

      return (
        <div className="api-manager" onClick={e => { if(e.target===e.currentTarget) onClose(); }}>
          <div className="api-panel">
            {/* Header */}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:"20px" }}>
              <div>
                <div style={{ fontFamily:"'Sora',sans-serif", fontSize:"18px", fontWeight:700, color:"#fff" }}>
                  🔑 Quản lý API Key
                </div>
                <div style={{ fontSize:"11px", color:"#555", marginTop:"4px" }}>
                  Thêm nhiều key — hệ thống tự động luân phiên để dùng chung
                </div>
              </div>
              <button onClick={onClose} style={{ background:"rgba(255,255,255,0.06)", border:"none", color:"#888", fontSize:"20px", cursor:"pointer", width:"34px", height:"34px", borderRadius:"8px", display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
            </div>

            {/* Mode toggle */}
            <div style={{ display:"flex", gap:"8px", marginBottom:"18px" }}>
              {[
                { id:"single", label:"👤 Dùng cá nhân" },
                { id:"pool",   label:"👥 Dùng chung / Pool" },
              ].map(m => (
                <button key={m.id} onClick={() => setMode(m.id)}
                  style={{ flex:1, padding:"8px", borderRadius:"10px", border:`1px solid ${mode===m.id ? "#4ECDC4" : "rgba(255,255,255,0.08)"}`, background: mode===m.id ? "rgba(78,205,196,0.1)" : "transparent", color: mode===m.id ? "#4ECDC4" : "#666", fontSize:"12px", fontWeight:600, cursor:"pointer", transition:"all 0.2s", fontFamily:"'Be Vietnam Pro',sans-serif" }}>
                  {m.label}
                </button>
              ))}
            </div>

            {mode === "pool" && (
              <div style={{ padding:"10px 12px", borderRadius:"10px", background:"rgba(78,205,196,0.05)", border:"1px solid rgba(78,205,196,0.15)", marginBottom:"16px", fontSize:"12px", color:"#5ecec7", lineHeight:1.6 }}>
                💡 <strong>Chế độ Pool:</strong> Thêm nhiều API Key. Mỗi lần gửi, hệ thống tự chọn key ít dùng nhất — lý tưởng cho nhóm học tập hoặc nhiều người dùng chung.
              </div>
            )}
            {mode === "single" && (
              <div style={{ padding:"10px 12px", borderRadius:"10px", background:"rgba(255,220,80,0.05)", border:"1px solid rgba(255,220,80,0.15)", marginBottom:"16px", fontSize:"12px", color:"#ffe066", lineHeight:1.6 }}>
                💡 <strong>Cá nhân:</strong> Chỉ dùng 1 key của bạn. Key được lưu tại trình duyệt, không gửi đi đâu ngoài Anthropic API.
              </div>
            )}

            {/* Key rows */}
            <div style={{ marginBottom:"10px" }}>
              {(mode === "single" ? rows.slice(0,1) : rows).map((row, idx) => (
                <div key={row._id} className={`key-row ${idx === 0 ? "active-key" : ""}`}>
                  <div style={{ fontSize:"11px", color:"#444", width:"14px", textAlign:"center", flexShrink:0 }}>{idx+1}</div>
                  {mode === "pool" && (
                    <input
                      value={row.label}
                      onChange={e => updateRow(row._id, "label", e.target.value)}
                      placeholder="Nhãn"
                      style={{ width:"64px", background:"transparent", border:"none", outline:"none", color:"#4ECDC4", fontSize:"11px", fontFamily:"'Be Vietnam Pro',sans-serif", fontWeight:600 }}
                    />
                  )}
                  <input
                    className="key-input"
                    type="password"
                    placeholder="sk-ant-api03-..."
                    value={row.key}
                    onChange={e => updateRow(row._id, "key", e.target.value)}
                  />
                  {row.uses > 0 && (
                    <span className="tag-badge">{row.uses} lần</span>
                  )}
                  {row.key.trim().startsWith("sk-") && (
                    <span style={{ fontSize:"14px" }}>✅</span>
                  )}
                  {mode === "pool" && rows.length > 1 && (
                    <button className="del-btn" onClick={() => removeRow(row._id)}>✕</button>
                  )}
                </div>
              ))}
            </div>

            {mode === "pool" && (
              <button className="add-key-btn" onClick={addRow}>＋ Thêm API Key</button>
            )}

            {/* How to get key */}
            <div style={{ marginTop:"16px", padding:"10px 12px", borderRadius:"10px", background:"rgba(255,255,255,0.02)", border:"1px solid rgba(255,255,255,0.05)", fontSize:"11px", color:"#555", lineHeight:1.7 }}>
              <span style={{ color:"#888", fontWeight:600 }}>Lấy API Key ở đâu?</span><br/>
              Truy cập <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener" style={{ color:"#4ECDC4" }}>console.anthropic.com/settings/keys</a> → tạo key → dán vào đây.
              Key chỉ lưu tại trình duyệt này.
            </div>

            <button className="save-btn-main" onClick={handleSave}>
              ✓ Lưu & Áp dụng {rows.filter(r=>r.key.trim().startsWith("sk-")).length > 0 ? `(${rows.filter(r=>r.key.trim().startsWith("sk-")).length} key)` : ""}
            </button>
          </div>
        </div>
      );
    }

    /* ─────────────── Main App ─────────────── */
    function App() {
      const [activeMode, setActiveMode]     = useState("explain");
      const [subject, setSubject]           = useState("Toán");
      const [input, setInput]               = useState("");
      const [messages, setMessages]         = useState([]);
      const [loading, setLoading]           = useState(false);
      const [sidebarOpen, setSidebarOpen]   = useState(false);
      const [showApiMgr, setShowApiMgr]     = useState(false);
      const [keyPool, setKeyPool]           = useState(() => loadPool());
      const [activeKeyIdx, setActiveKeyIdx] = useState(0);
      const bottomRef   = useRef(null);
      const textareaRef = useRef(null);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: "smooth" });
      }, [messages, loading]);

      const currentMode = MODES.find(m => m.id === activeMode);
      const validPool   = keyPool.filter(r => r.key && r.key.startsWith("sk-"));
      const hasKeys     = validPool.length > 0;

      function handleSavePool(pool) {
        setKeyPool(pool);
        savePool(pool);
        setActiveKeyIdx(0);
      }

      // Pick key with least uses (round-robin / load balance)
      function pickKey() {
        if (validPool.length === 0) return null;
        let minUses = Infinity, minIdx = 0;
        validPool.forEach((r, i) => {
          if ((r.uses || 0) < minUses) { minUses = r.uses || 0; minIdx = i; }
        });
        return { key: validPool[minIdx].key, poolIdx: keyPool.indexOf(validPool[minIdx]) };
      }

      function incrementUse(poolIdx) {
        setKeyPool(prev => {
          const next = prev.map((r, i) => i === poolIdx ? { ...r, uses: (r.uses || 0) + 1 } : r);
          savePool(next);
          return next;
        });
      }

      async function handleSubmit() {
        if (!input.trim() || loading) return;
        if (!hasKeys) {
          setShowApiMgr(true);
          return;
        }
        const picked = pickKey();
        if (!picked) { setShowApiMgr(true); return; }

        const userMsg = input.trim();
        setInput("");
        setMessages(prev => [...prev, { role:"user", text:userMsg, mode:activeMode }]);
        setLoading(true);

        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": picked.key,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true",
            },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1500,
              messages: [{ role:"user", content: getPrompt(activeMode, subject, userMsg) }],
            }),
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error.message);
          const reply = data.content?.map(b => b.text).join("") || "Không có phản hồi.";
          incrementUse(picked.poolIdx);
          setMessages(prev => [...prev, { role:"ai", text:reply, mode:activeMode }]);
        } catch (err) {
          setMessages(prev => [...prev, { role:"ai", text:`❌ Lỗi: ${err.message}`, mode:activeMode }]);
        }
        setLoading(false);
      }

      function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); handleSubmit(); }
      }

      const totalUses = keyPool.reduce((a, r) => a + (r.uses || 0), 0);

      return (
        <div style={{ display:"flex", height:"100vh", width:"100vw", background:"#080810", color:"#f0f0f5", overflow:"hidden", position:"relative" }}>
          {/* BG Orbs */}
          <div style={{ position:"fixed", top:"-100px", left:"-100px", width:"400px", height:"400px", borderRadius:"50%", background:"radial-gradient(circle, rgba(78,205,196,0.12) 0%, transparent 70%)", pointerEvents:"none" }} />
          <div style={{ position:"fixed", bottom:"-80px", right:"-80px", width:"350px", height:"350px", borderRadius:"50%", background:"radial-gradient(circle, rgba(255,139,148,0.10) 0%, transparent 70%)", pointerEvents:"none" }} />

          {/* API Manager Modal */}
          {showApiMgr && (
            <ApiManagerModal
              onClose={() => setShowApiMgr(false)}
              onSave={handleSavePool}
              initialPool={keyPool}
            />
          )}

          {/* Sidebar overlay */}
          {sidebarOpen && <div onClick={() => setSidebarOpen(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.6)", zIndex:50 }} />}

          {/* Sidebar */}
          <aside className={`sidebar ${sidebarOpen ? "sidebar-mobile-open" : ""}`} style={{ width:"272px", minWidth:"272px", height:"100vh", background:"rgba(12,12,20,0.98)", borderRight:"1px solid rgba(255,255,255,0.07)", display:"flex", flexDirection:"column", padding:"20px 14px", gap:"4px", overflowY:"auto", zIndex:60, backdropFilter:"blur(20px)" }}>
            <div style={{ display:"flex", alignItems:"center", gap:"12px", marginBottom:"18px" }}>
              <span style={{ fontSize:"30px" }}>🎓</span>
              <div>
                <div style={{ fontFamily:"'Sora',sans-serif", fontWeight:700, fontSize:"17px", color:"#fff" }}>StudyAI</div>
                <div style={{ fontSize:"10px", color:"#555", marginTop:"1px" }}>Trợ lý ôn thi thông minh</div>
              </div>
            </div>

            <div style={{ fontSize:"10px", fontWeight:700, color:"#444", letterSpacing:"0.12em", padding:"8px 4px 6px" }}>MÔN HỌC</div>
            <div style={{ display:"flex", flexWrap:"wrap", gap:"5px", marginBottom:"8px" }}>
              {SUBJECTS.map(s => (
                <button key={s} className="subject-btn" onClick={() => { setSubject(s); setSidebarOpen(false); }}
                  style={{ padding:"4px 10px", borderRadius:"20px", border:`1px solid ${subject===s ? "#4ECDC4" : "#2a2a3a"}`, background: subject===s ? "rgba(78,205,196,0.15)" : "transparent", color: subject===s ? "#4ECDC4" : "#888", fontSize:"12px", cursor:"pointer", transition:"all 0.2s" }}>
                  {s}
                </button>
              ))}
            </div>

            <div style={{ fontSize:"10px", fontWeight:700, color:"#444", letterSpacing:"0.12em", padding:"8px 4px 6px" }}>CÔNG CỤ</div>
            <div style={{ display:"flex", flexDirection:"column", gap:"2px" }}>
              {MODES.map(m => (
                <button key={m.id} className="mode-btn" onClick={() => { setActiveMode(m.id); setSidebarOpen(false); }}
                  style={{ display:"flex", alignItems:"center", gap:"10px", padding:"9px 10px", borderRadius:"10px", border:`1px solid ${activeMode===m.id ? m.color : "transparent"}`, background: activeMode===m.id ? "rgba(255,255,255,0.05)" : "transparent", color: activeMode===m.id ? "#fff" : "#777", cursor:"pointer", transition:"all 0.2s", textAlign:"left" }}>
                  <span style={{ width:"6px", height:"6px", borderRadius:"50%", background:m.color, flexShrink:0 }} />
                  <span style={{ fontSize:"15px" }}>{m.icon}</span>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:"13px", fontWeight:600 }}>{m.label}</div>
                    <div style={{ fontSize:"10px", color:"#555", marginTop:"1px" }}>{m.desc}</div>
                  </div>
                </button>
              ))}
            </div>

            {/* Key pool summary in sidebar */}
            <div style={{ marginTop:"auto" }}>
              <div onClick={() => setShowApiMgr(true)} style={{ padding:"10px 12px", borderRadius:"10px", background:"rgba(78,205,196,0.06)", border:"1px solid rgba(78,205,196,0.15)", cursor:"pointer", marginBottom:"8px", transition:"all 0.2s" }}
                onMouseEnter={e => e.currentTarget.style.background="rgba(78,205,196,0.1)"}
                onMouseLeave={e => e.currentTarget.style.background="rgba(78,205,196,0.06)"}>
                <div style={{ fontSize:"11px", fontWeight:700, color:"#4ECDC4", marginBottom:"6px" }}>🔑 API Keys</div>
                {validPool.length === 0 ? (
                  <div style={{ fontSize:"11px", color:"#555" }}>Chưa có key — nhấn để thêm</div>
                ) : (
                  <div style={{ display:"flex", flexDirection:"column", gap:"4px" }}>
                    {validPool.map((r, i) => (
                      <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <span style={{ fontSize:"11px", color:"#888" }}>{r.label || `Key ${i+1}`}</span>
                        <span style={{ fontSize:"10px", color:"#555" }}>{r.uses||0} lần</span>
                      </div>
                    ))}
                    <div style={{ fontSize:"10px", color:"#555", marginTop:"2px", borderTop:"1px solid rgba(255,255,255,0.05)", paddingTop:"4px" }}>
                      Tổng: {totalUses} lần dùng
                    </div>
                  </div>
                )}
              </div>

              <button className="clear-btn" onClick={() => { setMessages([]); setSidebarOpen(false); }}
                style={{ width:"100%", padding:"9px", borderRadius:"10px", border:"1px solid #2a2a3a", background:"transparent", color:"#555", cursor:"pointer", fontSize:"12px", transition:"all 0.2s" }}>
                🗑 Xoá lịch sử
              </button>
            </div>
          </aside>

          {/* Main */}
          <main style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden", position:"relative", zIndex:1, minWidth:0 }}>

            {/* Status bar */}
            <div className="status-bar">
              <button className="menu-btn" onClick={() => setSidebarOpen(true)}
                style={{ background:"none", border:"none", color:"#888", fontSize:"20px", cursor:"pointer", display:"none", alignItems:"center", justifyContent:"center" }}>☰</button>

              {hasKeys ? (
                <>
                  <div className="key-status-dot" style={{ background:"#4ECDC4", animation:"pulse 2s infinite" }} />
                  <span style={{ color:"#4ECDC4" }}>{validPool.length} key đang hoạt động</span>
                  <span style={{ color:"#383838" }}>·</span>
                  <span style={{ color:"#555" }}>Tự động luân phiên</span>
                  {validPool.length > 0 && (
                    <span className="usage-chip">
                      {validPool.map(r => r.label || "Key").join(" / ")}
                    </span>
                  )}
                </>
              ) : (
                <>
                  <div className="key-status-dot" style={{ background:"#ff6b6b" }} />
                  <span style={{ color:"#ff8080" }}>Chưa có API Key</span>
                </>
              )}

              <button onClick={() => setShowApiMgr(true)}
                style={{ marginLeft:"auto", padding:"4px 12px", borderRadius:"20px", border:"1px solid rgba(78,205,196,0.3)", background:"rgba(78,205,196,0.07)", color:"#4ECDC4", fontSize:"11px", fontWeight:600, cursor:"pointer", fontFamily:"'Be Vietnam Pro',sans-serif", transition:"all 0.2s" }}
                onMouseEnter={e => e.currentTarget.style.background="rgba(78,205,196,0.15)"}
                onMouseLeave={e => e.currentTarget.style.background="rgba(78,205,196,0.07)"}>
                {hasKeys ? "⚙ Quản lý Key" : "+ Thêm Key"}
              </button>
            </div>

            {/* Topbar */}
            <header style={{ display:"flex", alignItems:"center", gap:"10px", padding:"12px 18px", borderBottom:"1px solid rgba(255,255,255,0.06)", background:"rgba(8,8,16,0.85)", backdropFilter:"blur(20px)", flexShrink:0 }}>
              <button className="menu-btn" onClick={() => setSidebarOpen(true)}
                style={{ background:"none", border:"none", color:"#888", fontSize:"20px", cursor:"pointer", display:"none", alignItems:"center", justifyContent:"center" }}>☰</button>
              <div style={{ display:"flex", alignItems:"center", gap:"8px", flex:1 }}>
                <span style={{ padding:"3px 10px", borderRadius:"20px", fontSize:"12px", fontWeight:600, background: currentMode.color+"33", color: currentMode.color }}>
                  {currentMode.icon} {currentMode.label}
                </span>
                <span style={{ fontSize:"12px", color:"#555" }}>📖 {subject}</span>
              </div>
              <div className="topbar-right" style={{ display:"flex", alignItems:"center", gap:"6px" }}>
                <div style={{ width:"7px", height:"7px", borderRadius:"50%", background: hasKeys ? "#4ECDC4" : "#ff6b6b", animation:"pulse 2s infinite" }} />
                <span style={{ fontSize:"11px", color: hasKeys ? "#4ECDC4" : "#ff8080" }}>{hasKeys ? "AI Online" : "Cần Key"}</span>
              </div>
            </header>

            {/* Chat */}
            <div style={{ flex:1, overflowY:"auto", padding:"20px 18px", display:"flex", flexDirection:"column", gap:"14px" }}>
              {messages.length === 0 && (
                <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", textAlign:"center", padding:"40px 16px", animation:"fadeIn 0.6s ease" }}>
                  <div style={{ fontSize:"52px", marginBottom:"14px" }}>🎓</div>
                  <h2 style={{ fontFamily:"'Sora',sans-serif", fontSize:"22px", fontWeight:700, color:"#fff", marginBottom:"10px" }}>Chào mừng đến với StudyAI</h2>
                  <p style={{ fontSize:"13px", color:"#555", maxWidth:"380px", lineHeight:1.7, marginBottom:"12px" }}>
                    Trợ lý ôn thi thông minh — giải thích, ra đề, tóm tắt, làm flashcard và giải bài tập cho bạn.
                  </p>
                  {!hasKeys && (
                    <div onClick={() => setShowApiMgr(true)} style={{ padding:"10px 18px", borderRadius:"12px", background:"rgba(255,200,80,0.08)", border:"1px solid rgba(255,200,80,0.2)", color:"#ffdd66", fontSize:"12px", cursor:"pointer", marginBottom:"18px", transition:"all 0.2s" }}
                      onMouseEnter={e => e.currentTarget.style.background="rgba(255,200,80,0.14)"}
                      onMouseLeave={e => e.currentTarget.style.background="rgba(255,200,80,0.08)"}>
                      ⚠️ Nhấn đây để thêm API Key trước khi bắt đầu
                    </div>
                  )}
                  <div className="quick-grid" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px", width:"100%", maxWidth:"460px" }}>
                    {[
                      { text:"Giải thích định lý Pythagore", mode:"explain" },
                      { text:"Tạo 5 câu trắc nghiệm về nguyên tử", mode:"quiz" },
                      { text:"Tóm tắt chiến tranh thế giới thứ 2", mode:"summarize" },
                      { text:"Giải phương trình x² - 5x + 6 = 0", mode:"solve" },
                    ].map((q, i) => (
                      <button key={i} className="quick-btn" onClick={() => { setActiveMode(q.mode); setInput(q.text); textareaRef.current?.focus(); }}
                        style={{ padding:"11px 14px", borderRadius:"12px", border:"1px solid rgba(255,255,255,0.08)", background:"rgba(255,255,255,0.03)", color:"#888", cursor:"pointer", fontSize:"12px", textAlign:"left", lineHeight:1.5, transition:"all 0.2s" }}>
                        {q.text}
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {messages.map((msg, i) => (
                <div key={i} style={{ display:"flex", alignItems:"flex-end", gap:"8px", justifyContent: msg.role==="user" ? "flex-end" : "flex-start", animation:"fadeIn 0.3s ease" }}>
                  {msg.role === "ai" && (
                    <div style={{ width:"30px", height:"30px", borderRadius:"50%", background:"rgba(78,205,196,0.15)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"14px", flexShrink:0 }}>🎓</div>
                  )}
                  <div style={{ maxWidth:"76%", padding:"11px 15px", borderRadius:"16px", lineHeight:1.7, fontSize:"13.5px", whiteSpace:"pre-wrap",
                    ...(msg.role==="user"
                      ? { background:"linear-gradient(135deg,rgba(78,205,196,0.2),rgba(78,205,196,0.1))", border:"1px solid rgba(78,205,196,0.25)", color:"#dff4f4", borderBottomRightRadius:"4px" }
                      : { background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)", color:"#cccce0", borderBottomLeftRadius:"4px" }) }}>
                    {msg.role==="user" && (
                      <div style={{ marginBottom:"5px", display:"inline-block", padding:"2px 8px", borderRadius:"20px", fontSize:"11px", fontWeight:600, background: MODES.find(m=>m.id===msg.mode)?.color+"33", color: MODES.find(m=>m.id===msg.mode)?.color }}>
                        {MODES.find(m=>m.id===msg.mode)?.icon} {MODES.find(m=>m.id===msg.mode)?.label}
                      </div>
                    )}
                    <div>{msg.text}</div>
                  </div>
                  {msg.role === "user" && (
                    <div style={{ width:"30px", height:"30px", borderRadius:"50%", background:"rgba(255,139,148,0.15)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"14px", flexShrink:0 }}>👤</div>
                  )}
                </div>
              ))}

              {loading && (
                <div style={{ display:"flex", alignItems:"flex-end", gap:"8px" }}>
                  <div style={{ width:"30px", height:"30px", borderRadius:"50%", background:"rgba(78,205,196,0.15)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"14px" }}>🎓</div>
                  <div style={{ padding:"12px 16px", borderRadius:"16px", borderBottomLeftRadius:"4px", background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.08)" }}>
                    <div style={{ display:"flex", gap:"4px", alignItems:"center" }}>
                      {[0,0.2,0.4].map((d,i) => (
                        <span key={i} style={{ width:"7px", height:"7px", borderRadius:"50%", background:"#4ECDC4", display:"block", animation:`bounce 1.2s ${d}s infinite` }} />
                      ))}
                    </div>
                  </div>
                </div>
              )}
              <div ref={bottomRef} />
            </div>

            {/* Input */}
            <div style={{ padding:"14px 18px 18px", borderTop:"1px solid rgba(255,255,255,0.06)", background:"rgba(8,8,16,0.92)", backdropFilter:"blur(20px)", flexShrink:0 }}>
              <div style={{ background:"rgba(255,255,255,0.04)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"16px", overflow:"hidden" }}>
                <div style={{ display:"flex", gap:"5px", padding:"10px 12px 0", flexWrap:"wrap" }}>
                  {MODES.map(m => (
                    <button key={m.id} className="mode-chip" onClick={() => setActiveMode(m.id)}
                      style={{ padding:"3px 9px", borderRadius:"20px", fontSize:"11px", fontWeight:600, cursor:"pointer", transition:"all 0.2s", whiteSpace:"nowrap", border:`1.5px solid ${activeMode===m.id ? m.color : "#2a2a3a"}`, background: activeMode===m.id ? m.color : "transparent", color: activeMode===m.id ? "#0a0a0f" : "#666" }}>
                      {m.icon} {m.label}
                    </button>
                  ))}
                </div>
                <div style={{ display:"flex", gap:"8px", padding:"8px 12px 10px" }}>
                  <textarea ref={textareaRef} rows={2} value={input} onChange={e => setInput(e.target.value)} onKeyDown={handleKey}
                    placeholder={hasKeys ? currentMode.desc + "..." : "Thêm API Key để bắt đầu..."}
                    style={{ flex:1, background:"transparent", border:"none", outline:"none", color:"#f0f0f5", fontSize:"14px", resize:"none", fontFamily:"'Be Vietnam Pro',sans-serif", lineHeight:1.6 }} />
                  <button className="send-btn" onClick={handleSubmit} disabled={!input.trim() || loading}
                    style={{ width:"40px", height:"40px", borderRadius:"12px", border:"none", color:"#0a0a0f", fontSize:"18px", cursor:"pointer", flexShrink:0, fontWeight:700, transition:"all 0.2s", alignSelf:"flex-end", background: currentMode.color }}>
                    ➤
                  </button>
                </div>
                <div style={{ fontSize:"10px", color:"#383838", padding:"0 12px 8px" }}>Enter để gửi · Shift+Enter xuống dòng</div>
              </div>
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
